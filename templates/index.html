{%extends "layout.html"%}
{%block container%}

<div style="min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;">

    <div style="width: 64px; height: 64px; border-radius: 50%; background-color: #dbeafe; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>

    </div>

    <h1 style="font-size: 2rem; font-weight: 700; color: #111827; margin: 0 0 0.75rem;">
        Bienvenido al Sistema Escolar

    <p style="font-size: 1.1rem; color: #6b7280; margin: 0 0 2.5rem; max-width: 380px; line-height: 1.6;">
        Gestión de alumnos, maestros y cursos.
    </p>

    <a href="/cursos"
       style="background-color: #1d4ed8; color: #ffffff; text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 0.75rem 2.5rem; border-radius: 8px; transition: background-color 0.2s;">
        Ingresar al sistema

{%endblock%}
